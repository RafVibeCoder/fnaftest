<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FNAF: House of Predators</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="fnaf.css">

  <!-- THREE.JS CORE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

  <!-- THREE.JS POSTPROCESSING (Bloom, Vignette, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/shaders/VignetteShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/ShaderPass.js"></script>
</head>

<body>

  <!-- HUD -->
  <div id="hud">
    <div>State: <span id="state">Exploring</span></div>
    <div>Currency: <span id="currency">0</span></div>
    <div>Flashlight: <span id="battery">100%</span></div>
    <div>Tip: Click to lock mouse, WASD move, F flashlight, E hide</div>
  </div>

  <!-- Mouse Lock Message -->
  <div id="lockMsg">Click anywhere to enable mouse‑look</div>

  <!-- Crosshair -->
  <div id="crosshair"></div>

  <!-- Vignette -->
  <div id="vignette"></div>

  <!-- Damage Flash -->
  <div id="screenFlash"></div>

  <!-- Jumpscare Overlay -->
  <div id="jumpscareOverlay">YOU DIED</div>

  <!-- Title Card -->
  <div id="titleCard">
    <h1>HOUSE OF PREDATORS</h1>
    <p>Night 1 – Scraptrap is hunting.</p>
  </div>

  <!-- VHS Noise -->
  <div id="noiseOverlay"></div>

  <!-- Main Menu -->
  <div id="mainMenu">
    <h1>HOUSE OF PREDATORS</h1>
    <button id="btnStart">Start Night</button>
    <button id="btnQuit">Quit</button>
  </div>

  <!-- GAME ENGINE -->
  <script src="game.js"></script>

</body>
</html>
